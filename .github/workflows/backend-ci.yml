name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/**/requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f tests/requirements-test.txt ]; then \
            pip install -r tests/requirements-test.txt; \
          fi
          if [ -f src/requirements.txt ]; then \
            pip install -r src/requirements.txt; \
          fi
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check src tests || echo "::warning::ruff not yet configured"
        continue-on-error: true

      - name: Run pytest
        run: |
          if [ -d tests ] && [ "$(ls -A tests 2>/dev/null | grep -v gitkeep)" ]; then
            pytest tests/ -v
          else
            echo "::notice::No tests yet — Phase 1 will populate them."
          fi

  openapi-diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check baseline openapi.json exists
        id: check_baseline
        run: |
          if [ -f openapi.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::No baseline openapi.json yet — added in Phase 0f."
          fi

      - name: Set up Python
        if: steps.check_baseline.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps for OpenAPI generation
        if: steps.check_baseline.outputs.exists == 'true'
        run: |
          python -m pip install --upgrade pip
          # The generator only needs pydantic + the project's
          # model imports (no boto3 / no Lambda runtime).
          pip install -r src/requirements.txt

      - name: Generate OpenAPI from PR branch
        if: steps.check_baseline.outputs.exists == 'true'
        run: |
          python scripts/generate_openapi.py > /tmp/openapi-pr.json

      - name: Install oasdiff
        if: steps.check_baseline.outputs.exists == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/Tufin/oasdiff/main/install.sh | sh

      - name: Diff against baseline (breaking-change check)
        if: steps.check_baseline.outputs.exists == 'true'
        run: |
          # Fails the PR if any /v1/... route changed in a
          # breaking way (removed field, added required field,
          # changed type, removed enum value, etc.). Additive
          # changes pass.
          oasdiff breaking openapi.json /tmp/openapi-pr.json \
            --match-path '/v1/.*' \
            --fail-on ERR

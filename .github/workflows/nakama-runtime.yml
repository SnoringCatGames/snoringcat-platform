name: Nakama Runtime Deploy

# Build the snoringcat.so Nakama plugin and ship it to the
# Hetzner-hosted Nakama instance. Runs go vet + go test +
# staticcheck first; only deploys if all pass.
#
# Auto-fires on pushes to main that touch runtime/ (the Go
# source) or this workflow file. Manual fires available via
# workflow_dispatch for emergency rolls.
#
# Pre-rename note: this workflow used to live in the
# SnoringCatGames/hopnbop repo (with submodules: recursive
# checkout). Moved here 2026-05-23 so runtime changes
# auto-deploy without a parallel submodule pointer bump.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for rolling the runtime'
        required: false
        default: 'Manual deploy'
  push:
    branches: [main]
    paths:
      - 'runtime/**'
      - '.github/workflows/nakama-runtime.yml'

jobs:
  test:
    name: go vet + go test + staticcheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - run: go vet ./...
      - run: go test ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  nakama-runtime:
    name: Build and deploy snoringcat.so
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin .so
        run: |
          mkdir -p runtime/build
          BUILD_ID="${{ github.sha }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.BuildID=${BUILD_ID} -X main.BuildTime=${BUILD_TIME}"
          docker run --rm \
            -v "$PWD/runtime:/backend" -w /backend \
            heroiclabs/nakama-pluginbuilder:3.25.0 \
            build -buildmode=plugin -trimpath \
            -ldflags "${LDFLAGS}" \
            -o ./build/snoringcat.so .
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.NAKAMA_SSH_KEY }}
          NAKAMA_HOST: ${{ secrets.NAKAMA_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          scp -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ed25519 \
            runtime/build/snoringcat.so \
            "root@$NAKAMA_HOST:/opt/nakama/modules/snoringcat.so"
          ssh -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ed25519 "root@$NAKAMA_HOST" \
            "cd /opt/nakama && docker compose restart nakama"
      - name: Reason
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Reason: ${{ github.event.inputs.reason }}"

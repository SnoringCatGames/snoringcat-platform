  # Stack-level overrides (consumed by main.go's stackConfig).
  # Setting these explicitly makes Pulumi.<stack>.yaml the single
  # canonical record of "where this stack runs"; the defaults
  # in main.go remain as fallbacks for stacks that don't override.
  # Private IPs (10.0.1.10 / 10.0.1.20) and the /16 network range
  # stay hardcoded — changing them needs a state migration, not
  # just a config swap.
  snoringcat-platform:zoneName: snoringcat.games
  snoringcat-platform:location: hil
  snoringcat-platform:networkZone: us-west
  # 2026-06-01: upsized cpx11 -> cpx21 ahead of the 2026-06-15
  # Hetzner price hike to lock in the pre-hike monthly cap on the
  # existing contract (rescales price at new rates after that date).
  # Doubles RAM (2 -> 4 GB), adds a vCPU (2 -> 3) to make room for
  # cohabiting game-server containers under allocator_mode=local
  # without contending with Nakama/Postgres. Net cost delta vs
  # cpx11: +$5/mo; offset many times over by the Edgegap compute
  # savings the hybrid allocator enables.
  snoringcat-platform:serverType: cpx21
  snoringcat-platform:image: ubuntu-24.04

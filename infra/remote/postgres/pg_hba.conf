# Postgres host-based authentication for Phase A.
#
# Defense in depth: Hetzner Cloud Firewall blocks 5432 on the public
# interface, so the only path to this database is via the private
# 10.0.0.0/16 network (just the Nakama box for now). pg_hba.conf
# enforces it again at the database layer.

# TYPE  DATABASE  USER     ADDRESS         METHOD

# Local socket for in-container psql (admin tasks).
local   all       all                      trust

# Loopback inside the container.
host    all       all      127.0.0.1/32    scram-sha-256
host    all       all      ::1/128         scram-sha-256

# Nakama from the private network (Hetzner internal subnet).
host    nakama    nakama   10.0.0.0/16     scram-sha-256

# Everything else: deny by default (no further rules).

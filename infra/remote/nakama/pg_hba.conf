# Postgres host-based authentication. Single-host stack: the
# postgres container only needs to accept connections from nakama
# on the same docker network. Hetzner Cloud Firewall already
# blocks 5432 on the public interface, and we no longer publish
# 5432 from the postgres container — the only path in is via the
# `nakama-net` docker network.

# TYPE  DATABASE  USER     ADDRESS         METHOD

# Local socket for in-container psql (admin tasks).
local   all       all                      trust

# Loopback inside the container.
host    all       all      127.0.0.1/32    scram-sha-256
host    all       all      ::1/128         scram-sha-256

# Nakama (and pg-backup) from the docker bridge network. Docker's
# default-bridge subnets are typically 172.16.0.0/12 (the
# `default-address-pools` value); we keep the rule broad enough
# to accept whatever subnet docker assigns to nakama-net.
host    nakama    nakama   172.16.0.0/12   scram-sha-256

# Everything else: deny by default (no further rules).

# Prometheus scrape config for the snoringcat-platform stack.
#
# Targets after the 2026-05-13 lightweight obs re-introduction:
# Nakama metrics, node-exporter, postgres-exporter, Caddy admin
# /metrics. All co-tenanted on the same Hetzner CPX11
# (nakama-prod-1) following the 2026-05-06 consolidation —
# postgres-exporter runs alongside its postgres now, no
# cross-host scrape over the private network.
#
# Loki and the postgres-prod-1 scrape jobs that lived here
# pre-consolidation are intentionally absent: Loki isn't part
# of the lightweight re-introduction, and the separate Postgres
# box no longer exists.

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  external_labels:
    deploy: snoringcat-prod

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
        labels: { instance: nakama-prod-1 }

  - job_name: nakama
    metrics_path: /
    static_configs:
      - targets: [nakama:9099]
        labels: { instance: nakama-prod-1 }

  - job_name: caddy
    static_configs:
      - targets: [caddy:2019]
        labels: { instance: nakama-prod-1 }

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
        labels: { instance: nakama-prod-1 }

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
        labels: { instance: nakama-prod-1 }

  # cAdvisor exports per-container CPU / memory / network /
  # filesystem metrics for everything running on the docker
  # daemon. Surfaces game-server (LocalDockerAllocator) container
  # resource usage so a Grafana panel can validate the 512 mCPU
  # right-size from the cost-reduction Tier 1.1 work, and so
  # we can see per-match peaks once hybrid traffic flows.
  #
  # cAdvisor has its own service-discovery (one Prometheus
  # target = one /metrics endpoint covering every container);
  # no per-container target list needed here.
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
        labels: { instance: nakama-prod-1 }

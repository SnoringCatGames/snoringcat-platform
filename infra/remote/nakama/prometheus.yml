# Prometheus scrape config for the snoringcat-platform stack.
# Targets: Nakama metrics, both node_exporters, postgres_exporter,
# Caddy /metrics. Loki is scraped by Prometheus too (so we can
# alert on Loki ingestion drops, not because we serve Loki metrics
# from Grafana directly).

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  external_labels:
    deploy: snoringcat-prod

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
        labels: { instance: nakama-prod-1 }

  - job_name: nakama
    metrics_path: /
    static_configs:
      - targets: [nakama:9099]
        labels: { instance: nakama-prod-1 }

  - job_name: caddy
    static_configs:
      - targets: [caddy:2019]
        labels: { instance: nakama-prod-1 }

  - job_name: node-nakama
    static_configs:
      - targets: [node-exporter:9100]
        labels: { instance: nakama-prod-1 }

  - job_name: node-postgres
    static_configs:
      - targets: ["10.0.1.20:9100"]
        labels: { instance: postgres-prod-1 }

  - job_name: postgres
    static_configs:
      - targets: ["10.0.1.20:9187"]
        labels: { instance: postgres-prod-1 }

  - job_name: loki
    static_configs:
      - targets: [loki:3100]
        labels: { instance: nakama-prod-1 }

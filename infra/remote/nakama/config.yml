# Nakama config (non-sensitive). Sensitive values (DB password,
# console password, server key, session encryption key) come via
# CLI flags from docker-compose entrypoint.
name: nakama-prod
data_dir: "/nakama/data"

logger:
  level: "INFO"
  format: "json"
  stdout: true

socket:
  port: 7350
  read_buffer_size_bytes: 4096
  write_buffer_size_bytes: 4096

session:
  token_expiry_sec: 7200
  refresh_token_expiry_sec: 604800

# Tighter than Nakama's defaults (interval_sec=15, max_intervals=2).
# 1 s ticks for sub-second formation when max_count (4) is
# achievable; 10 s ceiling before relaxing to min_count (2) so
# under-filled lobbies don't sit waiting for a stranger that
# isn't coming.
matchmaker:
  interval_sec: 1
  max_intervals: 10

console:
  username: "admin"
  port: 7351

# OAuth provider env vars exposed to runtime modules (Phase C will
# add Go runtime modules that read these via nk.GetEnv()).
runtime:
  env:
    - "GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}"
    - "GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}"
    - "FACEBOOK_APP_ID=${FACEBOOK_APP_ID}"
    - "FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}"
    - "EDGEGAP_TOKEN=${EDGEGAP_TOKEN}"
    - "EDGEGAP_APP_NAME=${EDGEGAP_APP_NAME}"
    - "EDGEGAP_APP_VERSION=${EDGEGAP_APP_VERSION}"
    - "NAKAMA_GAME_VERSION=${NAKAMA_GAME_VERSION}"
    - "NAKAMA_PROTOCOL_VERSION=${NAKAMA_PROTOCOL_VERSION}"
    # Signaling proxy: stable WS endpoint that the matchmaker
    # hook signs URLs for, replacing the legacy per-deploy DNS
    # pattern. SIGNALING_HMAC_SECRET must match the value the
    # signaling-proxy systemd service reads from its own env.
    - "SIGNALING_DOMAIN=${SIGNALING_DOMAIN}"
    - "SIGNALING_HMAC_SECRET=${SIGNALING_HMAC_SECRET}"
    # Local Docker allocator: opt-in via LOCAL_PUBLIC_IP. When
    # set, the runtime constructs a LocalDockerAllocator that
    # spawns game-server containers on the Hetzner host's
    # docker daemon (mounted at /var/run/docker.sock — see
    # docker-compose.yml's volumes block). Games with
    # allocator_mode "local" or "hybrid" in game.yaml will use
    # this; everything else stays on Edgegap. Public IP is the
    # host's IPv4 (matches the Caddy A record). LOCAL_*_PORT_RANGE
    # default to 30000-30099 (UDP) and 30100-30199 (TCP) — set
    # explicitly only if there's a port-conflict with another
    # service on the host.
    # NOTE: LOCAL_* and GEOIP_* env vars are intentionally NOT
    # listed here. Nakama's runtime.env block passes string
    # literals through verbatim (no `${VAR}` expansion), so
    # configuring these via host .env + docker-compose's
    # environment block is the only reliable channel. The
    # runtime reads them via os.Getenv (see main.go
    # localAllocatorEnv).

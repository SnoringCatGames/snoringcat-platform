# Single-host stack for the consolidated CPX11 deployment.
# Nakama + Postgres + Caddy + signaling-proxy + a lightweight
# observability subset (Prometheus + Grafana + node-exporter +
# postgres-exporter) all co-tenant on one box.
#
# Loki + Promtail (log shipping) were intentionally NOT brought
# back in the 7.11 re-introduction (2026-05-13). Logs stay on
# `journalctl` / `docker logs`. The Loki / Promtail configs are
# preserved in this directory so a future game-side need for
# queryable logs can flip them on without rebuilding from
# scratch.
services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - "postgres"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
      - "-c"
      - "listen_addresses=*"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nakama-net

  nakama:
    image: heroiclabs/nakama:3.25.0
    container_name: nakama
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
      - |
        DB_ADDR="nakama:${POSTGRES_PASSWORD}@postgres:5432"
        /nakama/nakama migrate up --database.address "$$DB_ADDR/nakama"
        exec /nakama/nakama \
          --config /nakama/data/config.yml \
          --database.address "$$DB_ADDR/nakama" \
          --console.password "$$NAKAMA_CONSOLE_PASSWORD" \
          --socket.server_key "$$NAKAMA_SERVER_KEY" \
          --session.encryption_key "$$NAKAMA_SESSION_ENCRYPTION_KEY" \
          --session.refresh_encryption_key "$$NAKAMA_REFRESH_ENCRYPTION_KEY" \
          --runtime.http_key "$$NAKAMA_HTTP_KEY" \
          --console.signing_key "$$NAKAMA_CONSOLE_SIGNING_KEY" \
          --metrics.prometheus_port 9099
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NAKAMA_CONSOLE_PASSWORD: ${NAKAMA_CONSOLE_PASSWORD}
      NAKAMA_SERVER_KEY: ${NAKAMA_SERVER_KEY}
      NAKAMA_SESSION_ENCRYPTION_KEY: ${NAKAMA_SESSION_ENCRYPTION_KEY}
      NAKAMA_REFRESH_ENCRYPTION_KEY: ${NAKAMA_REFRESH_ENCRYPTION_KEY}
      NAKAMA_HTTP_KEY: ${NAKAMA_HTTP_KEY}
      NAKAMA_CONSOLE_SIGNING_KEY: ${NAKAMA_CONSOLE_SIGNING_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
    volumes:
      - ./config.yml:/nakama/data/config.yml:ro
      - ./modules:/nakama/data/modules:ro
      - nakama_data:/nakama/data/storage
    expose:
      - "7350"
      - "7351"
      - "7349"
      - "9099"  # Prometheus metrics endpoint.
    ports:
      - "127.0.0.1:7351:7351"
    healthcheck:
      # heroiclabs/nakama:3.x is a slim image without wget/curl.
      # The binary's own `nakama healthcheck` subcommand probes
      # the loopback HTTP healthcheck endpoint and exits 0/1.
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nakama-net

  caddy:
    # Custom build that bakes mholt/caddy-ratelimit. See
    # ./caddy/Dockerfile. Built locally; no image registry.
    build:
      context: ./caddy
    image: caddy-with-ratelimit:local
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    expose:
      - "2019"  # Caddy admin/metrics endpoint, scraped by Prometheus.
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - nakama-net
    depends_on:
      - nakama
      - signaling-proxy
      - grafana

  signaling-proxy:
    # WebSocket signaling bridge between clients and the
    # Edgegap-allocated game-server. Stable hostname behind
    # Caddy (signaling.snoringcat.games) so we don't need
    # per-deploy DNS / cert. See infra/remote/signaling-proxy/
    # for source.
    build:
      context: ./signaling-proxy
    image: snoringcat-signaling-proxy:local
    container_name: signaling-proxy
    restart: unless-stopped
    environment:
      SIGNALING_HMAC_SECRET: ${SIGNALING_HMAC_SECRET}
      SIGNALING_PROXY_LISTEN: "0.0.0.0:4435"
    networks:
      - nakama-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      # 30d retention sized to the existing TSDB headroom on
      # the 38 GB root disk. Prometheus default is 15d; 30d
      # gives one rolling month for trend analysis without
      # eating significant disk.
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - nakama-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.snoringcat.games
      GF_SERVER_DOMAIN: grafana.snoringcat.games
      GF_LOG_LEVEL: info
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    networks:
      - nakama-net
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/root"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    pid: host
    expose:
      - "9100"
    networks:
      - nakama-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://nakama:${POSTGRES_PASSWORD}@postgres:5432/nakama?sslmode=disable"
    expose:
      - "9187"
    networks:
      - nakama-net
    depends_on:
      postgres:
        condition: service_healthy

networks:
  nakama-net:

volumes:
  nakama_data:
  caddy_data:
  caddy_config:
  postgres_data:
  prometheus_data:
  grafana_data:

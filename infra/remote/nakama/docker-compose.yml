# Single-host stack for the consolidated CPX11 deployment. Nakama
# + Caddy + Postgres co-tenant on one box. The Prometheus / Grafana
# / Loki / Promtail / node-exporter / postgres-exporter services
# from the original two-box layout were dropped to free RAM on the
# 2 GB CPX11 — operational visibility is provided ad-hoc through
# UptimeRobot, the cost-monitor Discord pings, the daily Claude-
# scheduled prod-health-check job, and `journalctl` / `docker logs`
# on the host. The original observability config files
# (prometheus.yml, loki-config.yml, etc.) are still in this
# directory so they can be re-introduced later without
# reconstruction.
services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - "postgres"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
      - "-c"
      - "listen_addresses=*"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nakama-net

  nakama:
    image: heroiclabs/nakama:3.25.0
    container_name: nakama
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -ec
      - |
        DB_ADDR="nakama:${POSTGRES_PASSWORD}@postgres:5432"
        /nakama/nakama migrate up --database.address "$$DB_ADDR/nakama"
        exec /nakama/nakama \
          --config /nakama/data/config.yml \
          --database.address "$$DB_ADDR/nakama" \
          --console.password "$$NAKAMA_CONSOLE_PASSWORD" \
          --socket.server_key "$$NAKAMA_SERVER_KEY" \
          --session.encryption_key "$$NAKAMA_SESSION_ENCRYPTION_KEY" \
          --session.refresh_encryption_key "$$NAKAMA_REFRESH_ENCRYPTION_KEY" \
          --runtime.http_key "$$NAKAMA_HTTP_KEY" \
          --console.signing_key "$$NAKAMA_CONSOLE_SIGNING_KEY"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NAKAMA_CONSOLE_PASSWORD: ${NAKAMA_CONSOLE_PASSWORD}
      NAKAMA_SERVER_KEY: ${NAKAMA_SERVER_KEY}
      NAKAMA_SESSION_ENCRYPTION_KEY: ${NAKAMA_SESSION_ENCRYPTION_KEY}
      NAKAMA_REFRESH_ENCRYPTION_KEY: ${NAKAMA_REFRESH_ENCRYPTION_KEY}
      NAKAMA_HTTP_KEY: ${NAKAMA_HTTP_KEY}
      NAKAMA_CONSOLE_SIGNING_KEY: ${NAKAMA_CONSOLE_SIGNING_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
    volumes:
      - ./config.yml:/nakama/data/config.yml:ro
      - ./modules:/nakama/data/modules:ro
      - nakama_data:/nakama/data/storage
    expose:
      - "7350"
      - "7351"
      - "7349"
    ports:
      - "127.0.0.1:7351:7351"
    healthcheck:
      # heroiclabs/nakama:3.x is a slim image without wget/curl.
      # The binary's own `nakama healthcheck` subcommand probes
      # the loopback HTTP healthcheck endpoint and exits 0/1.
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nakama-net

  caddy:
    # Custom build that bakes mholt/caddy-ratelimit. See
    # ./caddy/Dockerfile. Built locally; no image registry.
    build:
      context: ./caddy
    image: caddy-with-ratelimit:local
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - nakama-net
    depends_on:
      - nakama

networks:
  nakama-net:

volumes:
  nakama_data:
  caddy_data:
  caddy_config:
  postgres_data:

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hop 'n Bop GameLift Backend v0.7.1

Globals:
  Function:
    Timeout: 120
    Runtime: python3.12
    MemorySize: 512
    Environment:
      Variables:
        GAME_VERSION: "0.30.0"
        PROTOCOL_VERSION: "2"
        PLAYERS_TABLE: !Ref PlayersTable
        MATCH_HISTORY_TABLE: !Ref MatchHistoryTable
        PROVIDER_MAPPINGS_TABLE: !Ref ProviderMappingsTable
        MATCHMAKING_CONFIG: !Ref MatchmakingConfigName
        CONSENT_AUDIT_TABLE: !Ref ConsentAuditTable
        SETTINGS_TABLE: !Ref SettingsTable
        LEADERBOARD_TABLE: !Ref LeaderboardTable
        FRIENDS_TABLE: !Ref FriendsTable
        PARTIES_TABLE: !Ref PartiesTable
        HOSTED_ZONE_ID: !Ref GameHostedZoneId
        POWERTOOLS_METRICS_NAMESPACE: HopNBop
        ACTIVE_SESSIONS_TABLE: !Ref ActiveSessionsTable
        FLEET_STATE_TABLE: !Ref FleetStateTable
        FLEET_ID: !Ref FleetId
        GAMELIFT_LOCATION: !Ref AWS::Region

Parameters:
  SteamAppID:
    Type: String
    Description: Steam App ID
    Default: ''

  MatchmakingConfigName:
    Type: String
    Description: GameLift matchmaking configuration name
    Default: 'hopnbop-ffa-matchmaker'

  AlertEmail:
    Type: String
    Description: Email address for CloudWatch alarm notifications
    Default: ''

  GameHostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID for hopnbop.net (used for game session DNS records)
    Default: 'Z05562172A1JF6AX39U2N'

  FleetId:
    Type: String
    Description: GameLift container fleet ID for warmup/scale operations. Empty string disables fleet operations.
    Default: ''

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Resources:
  # API Gateway
  GameBackendAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: false

  # Shared IAM policy for Secrets Manager access.
  SecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:hopnbop/*'

  # Shared IAM policy for GameLift fleet capacity operations.
  # Used by the fleet warmup/status/idle-check Lambdas and by the
  # match-end hook that refreshes fleet activity timestamps.
  GameLiftFleetPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - gamelift:DescribeFleetLocationCapacity
              - gamelift:UpdateFleetCapacity
              - gamelift:DescribeGameSessions
              - gamelift:DescribeContainerFleet
              - gamelift:ListFleets
            Resource: '*'

  # Lambda Functions
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.login
      Environment:
        Variables:
          STEAM_APP_ID: !Ref SteamAppID
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/login
            Method: post

  AuthAnonFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.anonymous_login
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        AnonLogin:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/anon
            Method: post

  AuthGuestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.guest_login
      Policies:
        - !Ref SecretsManagerPolicy
      Events:
        GuestLogin:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/guest
            Method: post

  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.refresh
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        Refresh:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/refresh
            Method: post

  AuthLinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.link_account
      Environment:
        Variables:
          STEAM_APP_ID: !Ref SteamAppID
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Link:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/link
            Method: post

  AuthUnlinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.unlink_account
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Unlink:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/unlink
            Method: post

  AuthMergeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.merge_accounts
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - !Ref SecretsManagerPolicy
      Events:
        MergeAccounts:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/merge
            Method: post

  AuthDeleteAccountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.delete_account
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConsentAuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - !Ref SecretsManagerPolicy
      Events:
        DeleteAccount:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/account
            Method: delete

  ExportPlayerDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.export_player_data
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - !Ref SecretsManagerPolicy
      Events:
        ExportData:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /player/export
            Method: get

  JoinMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.join_matchmaking
      Timeout: 150
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
                - gamelift:DescribeMatchmaking
                - gamelift:StopMatchmaking
                - gamelift:DescribeGameSessions
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - route53:ChangeResourceRecordSets
              Resource: !Sub "arn:aws:route53:::hostedzone/${GameHostedZoneId}"
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        Join:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/join
            Method: post

  StartMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.start_matchmaking
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
              Resource: '*'
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        StartMatch:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/start
            Method: post

  GetMatchStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.get_matchmaking_status
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:DescribeMatchmaking
                - gamelift:DescribeGameSessions
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - route53:ChangeResourceRecordSets
              Resource: !Sub "arn:aws:route53:::hostedzone/${GameHostedZoneId}"
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        GetStatus:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/status/{ticket_id}
            Method: get

  WarmupDnsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.warmup_dns
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:DescribeGameSessions
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - route53:ChangeResourceRecordSets
              Resource: !Sub "arn:aws:route53:::hostedzone/${GameHostedZoneId}"
        - !Ref SecretsManagerPolicy
      Events:
        WarmupDns:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /internal/dns/warmup
            Method: post

  LeaveMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.leave_matchmaking
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StopMatchmaking
              Resource: '*'
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        LeaveMatch:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/leave
            Method: post

  # Active Session Check
  GetActiveSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.session_handler.get_active_session
      MemorySize: 128
      Timeout: 5
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        GetActiveSession:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /session/active
            Method: get

  # Match Result Functions
  SubmitMatchResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.submit_match_result
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FleetStateTable
        - !Ref SecretsManagerPolicy
      Events:
        SubmitResult:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matches/result
            Method: post

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.get_leaderboard
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - !Ref SecretsManagerPolicy
      Events:
        GetLeaderboard:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /leaderboard
            Method: get

  GetPlayerStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.get_player_stats
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        GetPlayerStats:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /players/{player_id}/stats
            Method: get

  # Player Profile & Settings Functions
  GetPlayerProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.get_player_profile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /player/profile
            Method: get

  GetPlayerSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.get_player_settings
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - !Ref SecretsManagerPolicy
      Events:
        GetSettings:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /player/settings
            Method: get

  SavePlayerSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.save_player_settings
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - !Ref SecretsManagerPolicy
      Events:
        SaveSettings:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /player/settings
            Method: put

  GetMatchHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.get_match_history
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        GetHistory:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /player/history
            Method: get

  # Leaderboard Maintenance Functions
  WeeklyLeaderboardResetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.leaderboard_handler.reset_weekly_leaderboard
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        WeeklyReset:
          Type: Schedule
          Properties:
            Schedule: cron(0 0 ? * MON *)
            Description: Reset weekly leaderboards every Monday at 00:00 UTC

  # Version Check
  GetVersionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.version_handler.get_version
      MemorySize: 128
      Timeout: 5
      Events:
        GetVersion:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /version
            Method: get

  # Telemetry Functions
  CrashReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.telemetry_handler.handle_crash_report
      MemorySize: 256
      Timeout: 10
      Events:
        CrashReport:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /telemetry/crash
            Method: post

  # Friends Functions
  ListFriendsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.list_friends
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        ListFriends:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends
            Method: get

  AddFriendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.add_friend
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        AddFriend:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends/add
            Method: post

  RemoveFriendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.remove_friend
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        RemoveFriend:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends/remove
            Method: post

  AcceptFriendRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.accept_request
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        AcceptFriendRequest:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends/accept
            Method: post

  RejectFriendRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.reject_request
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        RejectFriendRequest:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends/reject
            Method: post

  CancelFriendRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.cancel_request
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        CancelFriendRequest:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends/cancel
            Method: post

  GetFriendNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.get_notifications
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        GetFriendNotifications:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends/notifications
            Method: get

  MarkFriendsSeenFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.mark_seen
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        MarkFriendsSeen:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends/seen
            Method: post

  SearchFriendCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.search_by_code
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        SearchFriendCode:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /friends/search
            Method: get

  # Presence Functions
  PresenceHeartbeatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.presence_handler.heartbeat
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        PresenceHeartbeat:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /presence/heartbeat
            Method: post

  # Party Functions
  CreatePartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.create_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - !Ref SecretsManagerPolicy
      Events:
        CreateParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /party/create
            Method: post

  InviteToPartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.invite_to_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        InviteToParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /party/invite
            Method: post

  JoinPartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.join_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - !Ref SecretsManagerPolicy
      Events:
        JoinParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /party/join
            Method: post

  LeavePartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.leave_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - !Ref SecretsManagerPolicy
      Events:
        LeaveParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /party/leave
            Method: post

  KickFromPartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.kick_from_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - !Ref SecretsManagerPolicy
      Events:
        KickFromParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /party/kick
            Method: post

  GetPartyStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.get_party_status
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - DynamoDBReadPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        GetPartyStatus:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /party/status
            Method: get

  StartPartyMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.start_party_matchmaking
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
                - gamelift:DescribeMatchmaking
                - gamelift:DescribeGameSessions
              Resource: '*'
        - !Ref SecretsManagerPolicy
      Events:
        StartPartyMatchmaking:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /party/start
            Method: post

  # Fleet Warmup and Idle Shutdown Functions
  FleetWarmupFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.fleet_handler.warm_up_fleet
      MemorySize: 256
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FleetStateTable
        - !Ref GameLiftFleetPolicy
      Events:
        Warmup:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /fleet/warmup
            Method: post

  FleetStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.fleet_handler.get_fleet_status
      MemorySize: 256
      Timeout: 10
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FleetStateTable
        - !Ref GameLiftFleetPolicy
      Events:
        Status:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /fleet/status
            Method: get

  FleetIdleCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.fleet_handler.scheduled_idle_check
      MemorySize: 256
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FleetStateTable
        - !Ref GameLiftFleetPolicy
      Events:
        IdleCheckSchedule:
          Type: Schedule
          Properties:
            # Runs every 5 minutes. Scales the fleet to 0 when
            # no active game sessions and >30 min since last
            # activity.
            Schedule: rate(5 minutes)
            Name: hopnbop-fleet-idle-check
            Description: Periodic fleet idle check for scale-to-zero

  # Monitoring and Alerting
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: hopnbop-alarms

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref AlarmNotificationTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hopnbop-lambda-errors
      AlarmDescription: Lambda function errors detected
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  ApiErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hopnbop-api-5xx-errors
      AlarmDescription: API Gateway 5xx error rate above 5 percent
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref GameBackendAPI
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0.05
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hopnbop-dynamodb-throttles
      AlarmDescription: DynamoDB throttle events detected
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  CrashRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hopnbop-crash-rate
      AlarmDescription: Client crash reports exceeding threshold
      Namespace: HopNBop
      MetricName: crash_report
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: hopnbop-monitoring
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "API Gateway Requests",
                "metrics": [
                  ["AWS/ApiGateway", "Count", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}],
                  ["AWS/ApiGateway", "5XXError", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}],
                  ["AWS/ApiGateway", "4XXError", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "API Latency (p50 / p99)",
                "metrics": [
                  ["AWS/ApiGateway", "Latency", "ApiName", "${GameBackendAPI}", {"stat": "p50"}],
                  ["AWS/ApiGateway", "Latency", "ApiName", "${GameBackendAPI}", {"stat": "p99"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors and Duration",
                "metrics": [
                  ["AWS/Lambda", "Errors", {"stat": "Sum"}],
                  ["AWS/Lambda", "Duration", {"stat": "Average"}],
                  ["AWS/Lambda", "Invocations", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "DynamoDB (Players Table)",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${PlayersTable}", {"stat": "Sum"}],
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${PlayersTable}", {"stat": "Sum"}],
                  ["AWS/DynamoDB", "ThrottledRequests", "TableName", "${PlayersTable}", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 24, "height": 6,
              "properties": {
                "title": "Game Analytics",
                "metrics": [
                  ["HopNBop", "auth_success", {"stat": "Sum"}],
                  ["HopNBop", "auth_failure", {"stat": "Sum"}],
                  ["HopNBop", "match_completed", {"stat": "Sum"}],
                  ["HopNBop", "player_connected", {"stat": "Sum"}],
                  ["HopNBop", "crash_report", {"stat": "Sum"}],
                  ["HopNBop", "fatal_crash", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            }
          ]
        }

  # DynamoDB Tables
  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-players
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: rating_partition
          AttributeType: S
        - AttributeName: rating
          AttributeType: N
        - AttributeName: friend_code
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: rating-index
          KeySchema:
            - AttributeName: rating_partition
              KeyType: HASH
            - AttributeName: rating
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - display_name
              - matches_played
              - wins
              - losses
        - IndexName: friend-code-index
          KeySchema:
            - AttributeName: friend_code
              KeyType: HASH
          Projection:
            ProjectionType: KEYS_ONLY

  ProviderMappingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-provider-mappings
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: provider_composite
          AttributeType: S
      KeySchema:
        - AttributeName: provider_composite
          KeyType: HASH

  MatchHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-match-history
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: match_timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
        - AttributeName: match_timestamp
          KeyType: RANGE

  ConsentAuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-consent-audit
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  SettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-settings
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH

  LeaderboardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-leaderboard
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: leaderboard_id
          AttributeType: S
        - AttributeName: score_player
          AttributeType: S
      KeySchema:
        - AttributeName: leaderboard_id
          KeyType: HASH
        - AttributeName: score_player
          KeyType: RANGE

  FriendsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-friends
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: friend_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
        - AttributeName: friend_id
          KeyType: RANGE

  PartiesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-parties
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: party_id
          AttributeType: S
      KeySchema:
        - AttributeName: party_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  ActiveSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-active-sessions
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  FleetStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-fleet-state
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: state_key
          AttributeType: S
      KeySchema:
        - AttributeName: state_key
          KeyType: HASH

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${GameBackendAPI}.execute-api.${AWS::Region}.amazonaws.com/prod'

  PlayersTableName:
    Description: 'DynamoDB players table'
    Value: !Ref PlayersTable

  ProviderMappingsTableName:
    Description: 'DynamoDB provider mappings table'
    Value: !Ref ProviderMappingsTable

  MatchHistoryTableName:
    Description: 'DynamoDB match history table'
    Value: !Ref MatchHistoryTable

  ConsentAuditTableName:
    Description: 'DynamoDB consent audit table'
    Value: !Ref ConsentAuditTable

  AlarmTopicArn:
    Description: 'SNS topic for alarm notifications'
    Value: !Ref AlarmNotificationTopic

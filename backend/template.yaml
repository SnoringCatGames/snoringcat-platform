AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Snoring Cat Platform Backend (shared multi-game stack)

# This stack hosts the shared backend for all Snoring Cat multiplayer
# titles. Per-game scoping is via the `game_id` JWT claim and the
# `games` config table; per-game GameLift fleets and matchmakers are
# referenced by ID from the games table at request time.
#
# Tables drop the legacy `hopnbop-` prefix in favor of `snoringcat-`.
# The old `hopnbop-*` tables continue to exist alongside this stack
# until the Phase 2 client cutover; migrate-from-hopnbop.py copies
# data over.

Globals:
  Function:
    Timeout: 120
    Runtime: python3.12
    MemorySize: 512
    Environment:
      Variables:
        # NOTE: GAME_VERSION and PROTOCOL_VERSION here are legacy from
        # the single-game era. Per-game versions live in the `games`
        # config table now. These remain for backward compatibility
        # with handlers not yet refactored.
        GAME_VERSION: "0.30.0"
        PROTOCOL_VERSION: "2"
        # Shared (cross-game) tables.
        ACCOUNTS_TABLE: !Ref AccountsTable
        IDENTITIES_TABLE: !Ref IdentitiesTable
        FRIENDS_TABLE: !Ref FriendsTable
        PRESENCE_TABLE: !Ref PresenceTable
        CONSENT_AUDIT_TABLE: !Ref ConsentAuditTable
        SETTINGS_TABLE: !Ref SettingsTable
        # Per-game tables (composite key includes game_id).
        GAME_PROFILES_TABLE: !Ref GameProfilesTable
        MATCH_HISTORY_TABLE: !Ref MatchHistoryTable
        LEADERBOARD_TABLE: !Ref LeaderboardTable
        PARTIES_TABLE: !Ref PartiesTable
        ACTIVE_SESSIONS_TABLE: !Ref ActiveSessionsTable
        FLEET_STATE_TABLE: !Ref FleetStateTable
        # Config table.
        GAMES_TABLE: !Ref GamesTable
        # Legacy aliases (kept until handlers stop reading them).
        # PLAYERS_TABLE points at the new accounts table; per-game fields
        # have moved to GAME_PROFILES_TABLE. PROVIDER_MAPPINGS_TABLE was
        # renamed to identities.
        PLAYERS_TABLE: !Ref AccountsTable
        PROVIDER_MAPPINGS_TABLE: !Ref IdentitiesTable
        # Matchmaking and fleet refs are now per-game (looked up from
        # the games table). These globals stay for legacy handler paths.
        MATCHMAKING_CONFIG: !Ref MatchmakingConfigName
        HOSTED_ZONE_ID: !Ref GameHostedZoneId
        FLEET_ID: !Ref FleetId
        GAMELIFT_LOCATION: !Ref AWS::Region
        POWERTOOLS_METRICS_NAMESPACE: SnoringCatPlatform
        # The `game_id` to use for legacy unauthenticated endpoints
        # and for any handler that has not yet been game-scoped.
        # New code reads game_id from the JWT or the URL path.
        DEFAULT_GAME_ID: !Ref DefaultGameId

Parameters:
  DefaultGameId:
    Type: String
    Description: |
      Fallback game_id for legacy handlers that do not yet read it
      from the JWT or URL path. Set to "hopnbop" while migrating.
    Default: 'hopnbop'

  SteamAppID:
    Type: String
    Description: Steam App ID
    Default: ''

  MatchmakingConfigName:
    Type: String
    Description: |
      Legacy default GameLift matchmaking configuration name. New
      per-game routing reads matchmaker from the games config table.
    Default: 'hopnbop-ffa-matchmaker'

  AlertEmail:
    Type: String
    Description: Email address for CloudWatch alarm notifications
    Default: ''

  GameHostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID for game session DNS records (legacy default)
    Default: 'Z05562172A1JF6AX39U2N'

  FleetId:
    Type: String
    Description: GameLift container fleet ID for warmup/scale operations. Empty string disables fleet operations.
    Default: ''

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Resources:
  # API Gateway
  GameBackendAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: false

  # Shared IAM policy for Secrets Manager access.
  SecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              # Read both legacy hopnbop secrets (oauth client secrets,
              # signing keys, etc.) and new snoringcat-platform secrets
              # so we can rotate to the new naming on our own schedule.
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:hopnbop/*'
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:snoringcat-platform/*'

  # Shared IAM policy for GameLift fleet capacity operations.
  # Used by the fleet warmup/status/idle-check Lambdas and by the
  # match-end hook that refreshes fleet activity timestamps.
  GameLiftFleetPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - gamelift:DescribeFleetLocationCapacity
              - gamelift:UpdateFleetCapacity
              - gamelift:DescribeGameSessions
              - gamelift:DescribeContainerFleet
              - gamelift:ListFleets
            Resource: '*'

  # Lambda Functions
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.login
      Environment:
        Variables:
          STEAM_APP_ID: !Ref SteamAppID
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdentitiesTable
        # Phase 1f follow-up dual-write to GameProfilesTable.
        - DynamoDBCrudPolicy:
            TableName: !Ref GameProfilesTable
        - !Ref SecretsManagerPolicy
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/auth/login
            Method: post

  AuthAnonFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.anonymous_login
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdentitiesTable
        # Phase 1f follow-up dual-write to GameProfilesTable.
        - DynamoDBCrudPolicy:
            TableName: !Ref GameProfilesTable
        - !Ref SecretsManagerPolicy
      Events:
        AnonLogin:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/auth/anon
            Method: post

  AuthGuestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.guest_login
      Policies:
        - !Ref SecretsManagerPolicy
      Events:
        GuestLogin:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/auth/guest
            Method: post

  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.refresh
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        Refresh:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/auth/refresh
            Method: post

  AuthLinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.link_account
      Environment:
        Variables:
          STEAM_APP_ID: !Ref SteamAppID
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdentitiesTable
        - !Ref SecretsManagerPolicy
      Events:
        Link:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/auth/link
            Method: post

  AuthUnlinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.unlink_account
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdentitiesTable
        - !Ref SecretsManagerPolicy
      Events:
        Unlink:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/auth/unlink
            Method: post

  AuthMergeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.merge_accounts
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdentitiesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - !Ref SecretsManagerPolicy
      Events:
        MergeAccounts:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/auth/merge
            Method: post

  AuthDeleteAccountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.delete_account
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdentitiesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConsentAuditTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - !Ref SecretsManagerPolicy
      Events:
        DeleteAccount:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/auth/account
            Method: delete

  ExportPlayerDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.export_player_data
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdentitiesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - !Ref SecretsManagerPolicy
      Events:
        ExportData:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/player/export
            Method: get

  JoinMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.join_matchmaking
      Timeout: 150
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
                - gamelift:DescribeMatchmaking
                - gamelift:StopMatchmaking
                - gamelift:DescribeGameSessions
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - route53:ChangeResourceRecordSets
              Resource: !Sub "arn:aws:route53:::hostedzone/${GameHostedZoneId}"
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        Join:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/matchmaking/join
            Method: post

  StartMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.start_matchmaking
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
              Resource: '*'
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        StartMatch:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/matchmaking/start
            Method: post

  GetMatchStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.get_matchmaking_status
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:DescribeMatchmaking
                - gamelift:DescribeGameSessions
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - route53:ChangeResourceRecordSets
              Resource: !Sub "arn:aws:route53:::hostedzone/${GameHostedZoneId}"
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        GetStatus:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/matchmaking/status/{ticket_id}
            Method: get

  WarmupDnsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.warmup_dns
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:DescribeGameSessions
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - route53:ChangeResourceRecordSets
              Resource: !Sub "arn:aws:route53:::hostedzone/${GameHostedZoneId}"
        - !Ref SecretsManagerPolicy
      Events:
        WarmupDns:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/internal/dns/warmup
            Method: post

  LeaveMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.leave_matchmaking
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StopMatchmaking
              Resource: '*'
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        LeaveMatch:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/matchmaking/leave
            Method: post

  # Active Session Check
  GetActiveSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.session_handler.get_active_session
      MemorySize: 128
      Timeout: 5
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - !Ref SecretsManagerPolicy
      Events:
        GetActiveSession:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/session/active
            Method: get

  # Match Result Functions
  SubmitMatchResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.submit_match_result
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ActiveSessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FleetStateTable
        - !Ref SecretsManagerPolicy
      Events:
        SubmitResult:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/matches/result
            Method: post

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.get_leaderboard
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
        - !Ref SecretsManagerPolicy
      Events:
        GetLeaderboard:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/leaderboard
            Method: get

  GetPlayerStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.get_player_stats
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        GetPlayerStats:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/players/{player_id}/stats
            Method: get

  # Player Profile & Settings Functions
  GetPlayerProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.get_player_profile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/player/profile
            Method: get

  GetPlayerSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.get_player_settings
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - !Ref SecretsManagerPolicy
      Events:
        GetSettings:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/player/settings
            Method: get

  SavePlayerSettingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.save_player_settings
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SettingsTable
        - !Ref SecretsManagerPolicy
      Events:
        SaveSettings:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/player/settings
            Method: put

  GetMatchHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.get_match_history
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        GetHistory:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/player/history
            Method: get

  # Leaderboard Maintenance Functions
  WeeklyLeaderboardResetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.leaderboard_handler.reset_weekly_leaderboard
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        WeeklyReset:
          Type: Schedule
          Properties:
            Schedule: cron(0 0 ? * MON *)
            Description: Reset weekly leaderboards every Monday at 00:00 UTC

  # Version Check
  GetVersionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.version_handler.get_version
      MemorySize: 128
      Timeout: 5
      Events:
        GetVersion:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/version
            Method: get

  # Telemetry Functions
  CrashReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.telemetry_handler.handle_crash_report
      MemorySize: 256
      Timeout: 10
      Events:
        CrashReport:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/telemetry/crash
            Method: post

  # Friends Functions
  ListFriendsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.list_friends
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        ListFriends:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends
            Method: get

  AddFriendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.add_friend
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        AddFriend:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends/add
            Method: post

  RemoveFriendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.remove_friend
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        RemoveFriend:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends/remove
            Method: post

  AcceptFriendRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.accept_request
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        AcceptFriendRequest:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends/accept
            Method: post

  RejectFriendRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.reject_request
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        RejectFriendRequest:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends/reject
            Method: post

  CancelFriendRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.cancel_request
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        CancelFriendRequest:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends/cancel
            Method: post

  GetFriendNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.get_notifications
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        GetFriendNotifications:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends/notifications
            Method: get

  MarkFriendsSeenFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.mark_seen
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        MarkFriendsSeen:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends/seen
            Method: post

  SearchFriendCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.friends_handler.search_by_code
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        SearchFriendCode:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/friends/search
            Method: get

  # Presence Functions
  PresenceHeartbeatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.presence_handler.heartbeat
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        PresenceHeartbeat:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/presence/heartbeat
            Method: post

  # Party Functions
  CreatePartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.create_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - !Ref SecretsManagerPolicy
      Events:
        CreateParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/party/create
            Method: post

  InviteToPartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.invite_to_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AccountsTable
        # Read presence to look up the invitee's current game_id
        # for cross-game invite rejection.
        - DynamoDBReadPolicy:
            TableName: !Ref PresenceTable
        - !Ref SecretsManagerPolicy
      Events:
        InviteToParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/party/invite
            Method: post

  JoinPartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.join_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - !Ref SecretsManagerPolicy
      Events:
        JoinParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/party/join
            Method: post

  LeavePartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.leave_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - !Ref SecretsManagerPolicy
      Events:
        LeaveParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/party/leave
            Method: post

  KickFromPartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.kick_from_party
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - !Ref SecretsManagerPolicy
      Events:
        KickFromParty:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/party/kick
            Method: post

  GetPartyStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.get_party_status
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - DynamoDBReadPolicy:
            TableName: !Ref AccountsTable
        - !Ref SecretsManagerPolicy
      Events:
        GetPartyStatus:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/party/status
            Method: get

  StartPartyMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.party_handler.start_party_matchmaking
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PartiesTable
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
                - gamelift:DescribeMatchmaking
                - gamelift:DescribeGameSessions
              Resource: '*'
        - !Ref SecretsManagerPolicy
      Events:
        StartPartyMatchmaking:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/party/start
            Method: post

  # Fleet Warmup and Idle Shutdown Functions
  FleetWarmupFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.fleet_handler.warm_up_fleet
      MemorySize: 256
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FleetStateTable
        - !Ref GameLiftFleetPolicy
      Events:
        Warmup:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/fleet/warmup
            Method: post

  FleetStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.fleet_handler.get_fleet_status
      MemorySize: 256
      Timeout: 10
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FleetStateTable
        - !Ref GameLiftFleetPolicy
      Events:
        Status:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /v1/fleet/status
            Method: get

  FleetIdleCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.fleet_handler.scheduled_idle_check
      MemorySize: 256
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FleetStateTable
        - !Ref GameLiftFleetPolicy
      Events:
        IdleCheckSchedule:
          Type: Schedule
          Properties:
            # Runs every 5 minutes. Scales the fleet to 0 when
            # no active game sessions and >30 min since last
            # activity.
            Schedule: rate(5 minutes)
            Name: snoringcat-platform-fleet-idle-check
            Description: Periodic fleet idle check for scale-to-zero

  # Monitoring and Alerting
  # Resource names use the snoringcat-platform- prefix to avoid
  # collision with the existing hopnbop stack's resources during
  # the parallel-deploy window. Once the old stack is torn down,
  # the prefix is purely cosmetic but stays for clarity.
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: snoringcat-platform-alarms

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref AlarmNotificationTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: snoringcat-platform-lambda-errors
      AlarmDescription: Lambda function errors detected
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  ApiErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: snoringcat-platform-api-5xx-errors
      AlarmDescription: API Gateway 5xx error rate above 5 percent
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref GameBackendAPI
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0.05
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: snoringcat-platform-dynamodb-throttles
      AlarmDescription: DynamoDB throttle events detected
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  CrashRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: snoringcat-platform-crash-rate
      AlarmDescription: Client crash reports exceeding threshold
      # The new stack publishes custom metrics under namespace
      # `SnoringCatPlatform` (set in Globals.Function.Environment).
      # The legacy `HopNBop` namespace is still emitted by the old
      # stack until cutover; the legacy alarm there continues to
      # watch it.
      Namespace: SnoringCatPlatform
      MetricName: crash_report
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: snoringcat-platform-monitoring
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "API Gateway Requests",
                "metrics": [
                  ["AWS/ApiGateway", "Count", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}],
                  ["AWS/ApiGateway", "5XXError", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}],
                  ["AWS/ApiGateway", "4XXError", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "API Latency (p50 / p99)",
                "metrics": [
                  ["AWS/ApiGateway", "Latency", "ApiName", "${GameBackendAPI}", {"stat": "p50"}],
                  ["AWS/ApiGateway", "Latency", "ApiName", "${GameBackendAPI}", {"stat": "p99"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors and Duration",
                "metrics": [
                  ["AWS/Lambda", "Errors", {"stat": "Sum"}],
                  ["AWS/Lambda", "Duration", {"stat": "Average"}],
                  ["AWS/Lambda", "Invocations", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "DynamoDB (Accounts Table)",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${AccountsTable}", {"stat": "Sum"}],
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${AccountsTable}", {"stat": "Sum"}],
                  ["AWS/DynamoDB", "ThrottledRequests", "TableName", "${AccountsTable}", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 24, "height": 6,
              "properties": {
                "title": "Game Analytics",
                "metrics": [
                  ["SnoringCatPlatform", "auth_success", {"stat": "Sum"}],
                  ["SnoringCatPlatform", "auth_failure", {"stat": "Sum"}],
                  ["SnoringCatPlatform", "match_completed", {"stat": "Sum"}],
                  ["SnoringCatPlatform", "player_connected", {"stat": "Sum"}],
                  ["SnoringCatPlatform", "crash_report", {"stat": "Sum"}],
                  ["SnoringCatPlatform", "fatal_crash", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            }
          ]
        }

  # ============================================================
  # DynamoDB Tables — global (cross-game)
  # ============================================================

  # Global player accounts. PK = player_id (UUID).
  # Phase 1f moves per-game stats out to GameProfilesTable; until then
  # this table mirrors the legacy hopnbop-players schema (including
  # rating, matches_played, wins, losses, display_name) so existing
  # match_service and player_service continue to work.
  # Once GameProfilesTable is in use, the rating-index GSI here
  # is dropped in favor of the equivalent GSI on GameProfilesTable.
  AccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-accounts
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: rating_partition
          AttributeType: S
        - AttributeName: rating
          AttributeType: N
        - AttributeName: friend_code
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: rating-index
          KeySchema:
            - AttributeName: rating_partition
              KeyType: HASH
            - AttributeName: rating
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - display_name
              - matches_played
              - wins
              - losses
        - IndexName: friend-code-index
          KeySchema:
            - AttributeName: friend_code
              KeyType: HASH
          Projection:
            ProjectionType: KEYS_ONLY

  # OAuth identity → account mapping. PK = "{provider}#{external_id}".
  # Renamed from ProviderMappingsTable.
  IdentitiesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-identities
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: provider_composite
          AttributeType: S
      KeySchema:
        - AttributeName: provider_composite
          KeyType: HASH

  # Global friends graph. PK = player_id, SK = friend_id.
  # Friendships span all games; each row holds status (pending,
  # accepted) and timestamps.
  FriendsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-friends
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: friend_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
        - AttributeName: friend_id
          KeyType: RANGE

  # Global presence. PK = player_id. Single row per player with the
  # game they're currently in, status, optional rich_presence string,
  # and TTL (so stale presence decays without active cleanup).
  PresenceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-presence
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ConsentAuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-consent-audit
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # Cloud-synced settings. PK = player_id (single-key for now).
  # Phase 1h adds SK = `scope` ("global" or "game#{game_id}") along
  # with the corresponding settings_service refactor; the migration
  # rewrites existing rows with scope="global".
  SettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-settings
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH

  # ============================================================
  # DynamoDB Tables — per-game
  # ============================================================

  # Per-game player profile. PK = player_id, SK = game_id.
  # Holds rating, matches_played, wins, losses, optional per-game
  # display_name override, first_played, game-specific JSON blob.
  # rating-index allows ranged leaderboard queries scoped by
  # rating_partition (game_id + tier).
  GameProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-game-profiles
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: game_id
          AttributeType: S
        - AttributeName: rating_partition
          AttributeType: S
        - AttributeName: rating
          AttributeType: N
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
        - AttributeName: game_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: rating-index
          KeySchema:
            - AttributeName: rating_partition
              KeyType: HASH
            - AttributeName: rating
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - display_name
              - matches_played
              - wins
              - losses
              - game_id

  # Per-player match history. PK = player_id, SK = match_timestamp.
  # Schema is unchanged from the legacy hopnbop-match-history table
  # to avoid breaking match_handler before it learns about game_id.
  # Phase 1g changes the SK to "{game_id}#{match_timestamp}" along
  # with the corresponding handler updates.
  # NOTE: rows written by the new platform stack include `game_id`
  # as a non-key attribute. Use a Scan with FilterExpression
  # `game_id = :game_id` until the SK refactor lands.
  MatchHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-match-history
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: match_timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
        - AttributeName: match_timestamp
          KeyType: RANGE

  # Leaderboards. PK = leaderboard_id where the id is
  # "{game_id}#{board_name}" (e.g. "hopnbop#global", "next#weekly").
  LeaderboardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-leaderboard
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: leaderboard_id
          AttributeType: S
        - AttributeName: score_player
          AttributeType: S
      KeySchema:
        - AttributeName: leaderboard_id
          KeyType: HASH
        - AttributeName: score_player
          KeyType: RANGE

  # Parties. PK = party_id. Row carries `game_id` attribute.
  # Party service rejects cross-game invites.
  PartiesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-parties
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: party_id
          AttributeType: S
      KeySchema:
        - AttributeName: party_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # Active GameLift sessions per player. PK = player_id.
  # Row holds `game_id` attribute alongside session_id, fleet_id, etc.
  ActiveSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-active-sessions
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # Fleet idle-tracking state. PK = state_key where the key is
  # "game#{game_id}" so each game's fleet has its own
  # last_activity_at row read by the scheduled idle-check Lambda.
  FleetStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-fleet-state
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: state_key
          AttributeType: S
      KeySchema:
        - AttributeName: state_key
          KeyType: HASH

  # ============================================================
  # DynamoDB Tables — config
  # ============================================================

  # Per-game runtime config. PK = game_id. Each row holds:
  #   display_name, icon_url, fleet_id, gamelift_location,
  #   matchmaker_name, matchmaker_ruleset, physics_fps,
  #   base_dns_zone, supported_transports (list), protocol_version,
  #   latest_game_version, feature_flags (map), created_at, updated_at.
  # Lambda handlers read this row and cache it in warm container
  # memory with a ~5 minute TTL.
  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: snoringcat-games
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: game_id
          AttributeType: S
      KeySchema:
        - AttributeName: game_id
          KeyType: HASH

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${GameBackendAPI}.execute-api.${AWS::Region}.amazonaws.com/prod'

  AccountsTableName:
    Description: 'DynamoDB accounts table (global player accounts)'
    Value: !Ref AccountsTable

  IdentitiesTableName:
    Description: 'DynamoDB identities table (OAuth identity → account mapping)'
    Value: !Ref IdentitiesTable

  GameProfilesTableName:
    Description: 'DynamoDB game-profiles table (per-game player data)'
    Value: !Ref GameProfilesTable

  GamesTableName:
    Description: 'DynamoDB games config table'
    Value: !Ref GamesTable

  PresenceTableName:
    Description: 'DynamoDB presence table'
    Value: !Ref PresenceTable

  FriendsTableName:
    Description: 'DynamoDB friends table (global friend graph)'
    Value: !Ref FriendsTable

  MatchHistoryTableName:
    Description: 'DynamoDB match history table'
    Value: !Ref MatchHistoryTable

  LeaderboardTableName:
    Description: 'DynamoDB leaderboard table'
    Value: !Ref LeaderboardTable

  PartiesTableName:
    Description: 'DynamoDB parties table'
    Value: !Ref PartiesTable

  ActiveSessionsTableName:
    Description: 'DynamoDB active-sessions table'
    Value: !Ref ActiveSessionsTable

  FleetStateTableName:
    Description: 'DynamoDB fleet-state table'
    Value: !Ref FleetStateTable

  SettingsTableName:
    Description: 'DynamoDB settings table'
    Value: !Ref SettingsTable

  ConsentAuditTableName:
    Description: 'DynamoDB consent-audit table'
    Value: !Ref ConsentAuditTable

  AlarmTopicArn:
    Description: 'SNS topic for alarm notifications'
    Value: !Ref AlarmNotificationTopic
